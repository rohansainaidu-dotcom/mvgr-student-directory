<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MVGR Student Directory</title>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="login-wrapper">
  <div class="login-box">

    <h1>🎓 MVGR</h1>
    <p class="subtitle">Student Directory Portal</p>

    <!-- Tab Toggle -->
    <div class="role-toggle">
      <button id="login-tab" class="active" onclick="showTab('login')">Login</button>
      <button id="register-tab" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="role-toggle" style="margin-bottom:16px;">
        <button id="student-tab" class="active" onclick="setRole('student')">Student</button>
        <button id="faculty-tab" onclick="setRole('faculty')">Faculty</button>
      </div>
      <input type="email" id="login-email" placeholder="Email"/>
      <input type="password" id="login-password" placeholder="Password"/>
      <button class="login-btn" onclick="login()">Login</button>
      <p id="login-error" class="error"></p>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <input type="text" id="reg-roll" placeholder="Roll Number (e.g. 22CS001)"/>
      <input type="email" id="reg-email" placeholder="Email"/>
      <input type="password" id="reg-password" placeholder="Create Password (min 6 chars)"/>
      <input type="password" id="reg-confirm" placeholder="Confirm Password"/>
      <button class="login-btn" onclick="register()">Create Account</button>
      <p id="register-error" class="error"></p>
      <p id="register-success" class="success"></p>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="login.js"></script>
</body>
</html>
